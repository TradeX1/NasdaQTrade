<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Ultimate</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.header{background:#ff9800;padding:15px;text-align:center;font-weight:bold}
.card{background:#111;padding:15px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px}
button{background:#ff9800;color:#fff}
.bottom{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.bottom button{flex:1;background:#222}
</style>
</head>

<body>

<div class="header">🔥 TradeX ULTIMATE</div>

<!-- AUTH -->
<div id="auth">
<div class="card">
<h3>Signup</h3>
<input id="su_user" placeholder="Username">
<input id="su_email" placeholder="Email">
<input id="su_pass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<div class="card">
<h3>Login</h3>
<input id="li_email" placeholder="Email">
<input id="li_pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="card">
<h3>Welcome <span id="user"></span></h3>
<p id="email"></p>
<h2>Balance: $<span id="bal">0</span></h2>
</div>

<div class="card">
<h3>Trade</h3>
<input id="amount" placeholder="Enter amount">
<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>
</div>

<div class="card">
<h3>💰 Add Funds</h3>
<button onclick="openDeposit()">Add Funds</button>

<div id="depositBox" style="display:none;">
<p>Send USDT (TRC20) to this wallet:</p>
<p id="walletAddress">TQ6RJsuo9xah3GbL4U3fuboTYhGkdY6CB</p>
<button onclick="copyWallet()">Copy Address</button>
<br><br>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TQ6RJsuo9xah3GbL4U3fuboTYhGkdY6CB">
<br><br>
<button onclick="closeDeposit()">Close</button>
</div>
</div>

<div class="card">
<h3>Market</h3>
<button onclick="setCoin('BTCUSDT')">BTC</button>
<button onclick="setCoin('ETHUSDT')">ETH</button>
<button onclick="setCoin('BNBUSDT')">BNB</button>
<iframe id="chart" width="100%" height="300"></iframe>
</div>

<button onclick="openSupport()">Customer Support 💬</button>

<!-- ADMIN -->
<div id="adminPanel" class="card" style="display:none">
<h3>👑 Admin Panel</h3>
<div id="adminMessages"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

<!-- CHAT -->
<div id="supportBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;">
<div style="background:#222;padding:10px;">
Support Chat
<button onclick="closeSupport()">X</button>
</div>

<div id="chatArea" style="height:70%;overflow:auto;"></div>

<input id="supportMsg">
<button onclick="sendSupport()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbMvOjA4m1QtnuRt7m7jXAddQq-W-Sh-k",
  authDomain: "tradex-support.firebaseapp.com",
  projectId: "tradex-support"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentChatUser = "";

// SIGNUP
window.signup = async function(){
  await addDoc(collection(db,"users"),{
    user: su_user.value,
    email: su_email.value,
    pass: su_pass.value,
    balance: 0
  });
  alert("Signup Done ✅");
}

// LOGIN
window.login = async function(){
  let snap = await getDocs(collection(db,"users"));

  snap.forEach(docSnap=>{
    let d = docSnap.data();

    if(d.email==li_email.value && d.pass==li_pass.value){

      localStorage.setItem("user",JSON.stringify(d));

      user.innerText=d.user;
      email.innerText=d.email;
      bal.innerText=d.balance;

      auth.style.display="none";
      dashboard.style.display="block";

      if(d.email=="admin@tradex.com"){
        adminPanel.style.display="block";
        loadAdminMessages();
      }
    }
  });
}

// BUY / SELL
window.buy = ()=> alert("⚠️ Please Add Funds First");
window.sell = ()=> alert("✅ Withdraw will be approved soon");

// DEPOSIT
window.openDeposit=()=>depositBox.style.display="block";
window.closeDeposit=()=>depositBox.style.display="none";
window.copyWallet=()=>{
  navigator.clipboard.writeText(walletAddress.innerText);
  alert("Copied ✅");
}

// CHART
window.setCoin = c => chart.src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:"+c;

// CHAT USER
window.openSupport=()=>{supportBox.style.display="block";loadChat();}
window.closeSupport=()=>supportBox.style.display="none";

async function loadChat(){
  let u=JSON.parse(localStorage.getItem("user"));
  let snap=await getDocs(collection(db,"support"));
  let html="";
  snap.forEach(doc=>{
    let d=doc.data();
    if(d.email==u.email) html+=`<p>${d.message}</p>`;
  });
  chatArea.innerHTML=html;
}

// SEND
window.sendSupport=async function(){
  let u=JSON.parse(localStorage.getItem("user"));
  let msg=supportMsg.value;

  let email=currentChatUser||u.email;
  let sender=currentChatUser?"admin":"user";

  await addDoc(collection(db,"support"),{email,message:msg,sender});

  supportMsg.value="";
  currentChatUser?loadAdminChat():loadChat();
}

// ADMIN LIST
async function loadAdminMessages(){
  let snap=await getDocs(collection(db,"support"));
  let html="";
  snap.forEach(doc=>{
    let d=doc.data();
    html+=`<p onclick="openAdminChat('${d.email}')">${d.email}</p>`;
  });
  adminMessages.innerHTML=html;
}

// ADMIN CHAT
window.openAdminChat=function(email){
  currentChatUser=email;
  openSupport();
  loadAdminChat();
}

async function loadAdminChat(){
  let snap=await getDocs(collection(db,"support"));
  let html="";
  snap.forEach(doc=>{
    let d=doc.data();
    if(d.email==currentChatUser){
      html+=`<p>${d.sender}: ${d.message}</p>`;
    }
  });
  chatArea.innerHTML=html;
}

window.logout=()=>location.reload();
window.onload=()=>setCoin("BTCUSDT");

</script>

</body>
  </html>
