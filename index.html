<!DOCTYPE html>
<html>
<head>
  <title>TradeX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111;
  border-bottom:2px solid #ff7a00;
}

.topbar h2{
  margin:0;
  color:#ff7a00;
}

.balance{
  background:#ff7a00;
  color:black;
  padding:8px 12px;
  border-radius:8px;
  font-weight:bold;
}

/* PAGES */
.page{
  padding:15px;
}

/* COINS */
.cardBox{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.coin{
  background:#1c1c1c;
  padding:12px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  border-left:3px solid #ff7a00;
}

/* BOTTOM NAV */
.bottomNav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:#111;
  border-top:2px solid #ff7a00;
}

.bottomNav button{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
  font-weight:bold;
}

.bottomNav button:hover{
  background:#ff7a00;
  color:black;
}

/* HIDDEN */
.hidden{display:none;}
  </style>
</head>

<body>

<div class="container">

  <div class="card" id="authBox">

    <h1>TradeX</h1>

    <!-- SIGNUP -->
    <div id="signupBox">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPass" placeholder="Password">
      <button onclick="signup()">Sign Up</button>
      <div class="switch" onclick="toggle()">Already have account? Login</div>
    </div>

    <!-- LOGIN -->
    <div id="loginBox" class="hidden">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPass" placeholder="Password">
      <button onclick="login()">Login</button>
      <div class="switch" onclick="toggle()">Create new account</div>
    </div>

  </div>

  <!-- DASHBOARD SECTION -->
<div id="dashboard" class="hidden">

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <h2>TradeX VIP</h2>
      <p id="userEmail"></p>
    </div>
    <div class="balance">
      $0.00
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="home" class="page">
    <h3>🔥 Hot Coins</h3>

    <div class="cardBox">
      <div class="coin">BTC/USDT <span>+2.5%</span></div>
      <div class="coin">ETH/USDT <span>+1.2%</span></div>
      <div class="coin">BNB/USDT <span>+3.1%</span></div>
    </div>
  </div>

  <div id="market" class="page hidden">
    <h3>📊 Market</h3>
    <p>Live charts coming soon...</p>
  </div>

  <div id="asset" class="page hidden">
    <h3>💰 Assets</h3>
    <p>No assets yet</p>
  </div>

  <div id="support" class="page hidden">
    <h3>🛟 Support</h3>
    <p>Contact admin: support@tradex.com</p>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottomNav">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('market')">Market</button>
    <button onclick="showPage('asset')">Asset</button>
    <button onclick="showPage('support')">Support</button>
  </div>

</div>

<script>
  // SWITCH UI
  function toggle() {
    document.getElementById("signupBox").classList.toggle("hidden");
    document.getElementById("loginBox").classList.toggle("hidden");
  }

  // SIGNUP
  function signup() {
    let email = document.getElementById("signupEmail").value;
    let pass = document.getElementById("signupPass").value;

    if (!email || !pass) return alert("Fill all fields");

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let exists = users.find(u => u.email === email);
    if (exists) return alert("Email already exists");

    users.push({ email, pass });
    localStorage.setItem("users", JSON.stringify(users));

    alert("Account created ✅ Now login");
    toggle();
  }

  // LOGIN
  function login() {
    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPass").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    let user = users.find(u => u.email === email && u.pass === pass);

    if (!user) return alert("Invalid email or password");

    localStorage.setItem("currentUser", JSON.stringify(user));

    showDashboard();
  }

  function showDashboard() {
    let user = JSON.parse(localStorage.getItem("currentUser"));

    document.getElementById("authBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("userEmail").innerText = user.email;
  }

  function logout() {
    localStorage.removeItem("currentUser");

    document.getElementById("authBox").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
  }

  // AUTO LOGIN CHECK
  window.onload = function () {
    if (localStorage.getItem("currentUser")) {
      showDashboard();
    }
  }
</script>
<script>
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>{
    p.classList.add("hidden");
  });

  document.getElementById(page).classList.remove("hidden");
}

// LOGIN SUCCESS ME DASHBOARD OPEN
function showDashboard(){
  let user = JSON.parse(localStorage.getItem("currentUser"));

  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("userEmail").innerText = user.email;
}
</script>
</body>
</html>
