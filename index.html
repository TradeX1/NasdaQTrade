<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Ultimate</title><style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.header{background:#ff9800;padding:15px;text-align:center;font-weight:bold}
.card{background:#111;margin:10px;padding:15px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px}
button{background:#ff9800;color:#fff}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.nav button{flex:1;background:#222}
.chat{height:200px;overflow:auto;background:#000;padding:10px;border-radius:8px}
</style></head>
<body><div class="header">🔥 TradeX Ultimate</div><!-- AUTH --><div id="auth" class="card">
<h3>Signup</h3>
<input id="su_email" placeholder="Email">
<input id="su_pass" placeholder="Password">
<button onclick="signup()">Signup</button><h3>Login</h3>
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div><!-- DASHBOARD --><div id="dashboard" style="display:none"><div class="card">
<h3>Welcome <span id="user"></span></h3>
<p>Balance: $<span id="bal">0</span></p>
<button onclick="openDeposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
</div><div class="card">
<h3>Trade</h3>
<input placeholder="Amount">
<button onclick="goSupport()">Buy</button>
<button onclick="goSupport()">Sell</button>
</div><div class="card">
<h3>Market</h3>
<select onchange="changeCoin(this.value)">
<option value="BTCUSDT">BTC</option>
<option value="ETHUSDT">ETH</option>
<option value="BNBUSDT">BNB</option>
</select>
<iframe id="chart" width="100%" height="300"></iframe>
</div><!-- SUPPORT PAGE --><div id="supportPage" class="card" style="display:none">
<h3>Customer Support</h3>
<div id="chatBox" class="chat">
<p><b>Support:</b> Hello 👋</p>
</div>
<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>
</div><!-- ADMIN --><div id="adminPanel" class="card" style="display:none">
<h3>Admin Panel</h3>
<input id="targetEmail" placeholder="User Email">
<input id="amount" placeholder="+ / - amount">
<button onclick="updateBalance()">Update Balance</button>
</div><button onclick="logout()">Logout</button>

</div><!-- NAV --><div class="nav">
<button onclick="showHome()">Home</button>
<button onclick="showMarket()">Market</button>
<button onclick="openTelegram()">Support</button>
</div><script>

const ADMIN="admin@tradex.com";

// SIGNUP
function signup(){
let e=su_email.value;
let p=su_pass.value;

if(!e||!p){alert("Enter details");return;}

let data={email:e,pass:p,user:e,balance:0};
localStorage.setItem("user_"+e,JSON.stringify(data));
alert("Signup Success");
}

// LOGIN
function login(){
let e=email.value;
let p=pass.value;

let saved=localStorage.getItem("user_"+e);
if(!saved){alert("No user");return;}

let data=JSON.parse(saved);
if(data.pass!==p){alert("Wrong password");return;}

localStorage.setItem("currentUser",e);
loadUser();
}

// LOAD USER
function loadUser(){
let e=localStorage.getItem("currentUser");
if(!e)return;

let data=JSON.parse(localStorage.getItem("user_"+e));

auth.style.display="none";
dashboard.style.display="block";

user.innerText=data.user;
bal.innerText=data.balance;

if(e===ADMIN){adminPanel.style.display="block";}
}

window.onload=function(){
loadUser();
changeCoin('BTCUSDT');
}

// LOGOUT
function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

// ADMIN BALANCE
function updateBalance(){
let admin=localStorage.getItem("currentUser");
if(admin!==ADMIN){alert("Only admin");return;}

let target=targetEmail.value;
let amt=parseInt(amount.value);

let saved=localStorage.getItem("user_"+target);
if(!saved){alert("User not found");return;}

let data=JSON.parse(saved);
data.balance+=amt;

localStorage.setItem("user_"+target,JSON.stringify(data));

if(localStorage.getItem("currentUser")===target){
bal.innerText=data.balance;
}

alert("Updated ✅");
}

// SUPPORT
function goSupport(){
alert("Contact customer support");
openTelegram();
}

function withdraw(){
alert("Contact customer support for withdraw");
openTelegram();
}

function openTelegram(){
window.open("https://t.me/raguadmin","_blank");
}

// CHAT
function sendMsg(){
let m=msg.value;
if(!m)return;
chatBox.innerHTML+=`<p><b>You:</b> ${m}</p>`;
msg.value="";
}

// NAV
function showHome(){supportPage.style.display="none"}
function showMarket(){supportPage.style.display="none"}

// CHART
function changeCoin(sym){
chart.src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:"+sym;
}

// DEPOSIT
function openDeposit(){alert("Send USDT TRC20 to wallet");}

</script></body>
</html>
