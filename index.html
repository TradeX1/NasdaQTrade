<!DOCTYPE html>
<html>
<head>
  <title>TradeX VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TradingView -->
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0b0b;
      color:white;
    }

    .container{
      max-width:420px;
      margin:auto;
    }

    .card{
      background:#111;
      padding:15px;
      margin:10px;
      border-radius:12px;
    }

    h1,h2,h3{color:#ff7a00;margin:5px 0}

    input{
      width:100%;
      padding:10px;
      margin:5px 0;
      background:#1c1c1c;
      border:none;
      color:white;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:8px;
      border:none;
      border-radius:8px;
      background:#ff7a00;
      font-weight:bold;
    }

    .hidden{display:none}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .bottomNav{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:#111;
    }

    .bottomNav button{
      flex:1;
      background:none;
      color:white;
      padding:10px;
    }

    .coin{
      background:#1c1c1c;
      padding:10px;
      margin:5px 0;
      border-left:3px solid #ff7a00;
    }

    #depositBox{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
    }

    #depositBox div{
      background:#111;
      padding:15px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="container">

<!-- AUTH -->
<div id="authBox" class="card">
  <h1>TradeX</h1>

  <div id="signupBox">
    <input id="suEmail" placeholder="Email">
    <input id="suPass" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <p onclick="toggle()">Login</p>
  </div>

  <div id="loginBox" class="hidden">
    <input id="liEmail" placeholder="Email">
    <input id="liPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p onclick="toggle()">Sign Up</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

  <div class="card topbar">
    <div>
      <h3>TradeX VIP</h3>
      <p id="userEmail"></p>
    </div>

    <div>
      <button onclick="openDeposit()">+ Add Fund</button>
      <h3 id="bal">$0</h3>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="page card">
    <h3>🔥 Live Market</h3>
    <div id="prices">Loading...</div>
  </div>

  <!-- MARKET -->
  <div id="market" class="page card hidden">
    <h3>📊 Chart</h3>
    <div id="chart"></div>
  </div>

  <!-- ASSET -->
  <div id="asset" class="page card hidden">
    <h3>💰 Assets</h3>
    <h2 id="balance">$0</h2>
  </div>

  <!-- SUPPORT -->
  <div id="support" class="page card hidden">
    <h3>🛟 Support</h3>
    <p>24/7 Help</p>
  </div>

</div>

<!-- NAV -->
<div class="bottomNav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('market')">Market</button>
  <button onclick="showPage('asset')">Asset</button>
  <button onclick="showPage('support')">Support</button>
</div>

</div>

<!-- DEPOSIT -->
<div id="depositBox">
  <div>
    <h3>Deposit USDT (TRC20)</h3>
    <p style="word-break:break-all;">
      TLdHhSyHgi8kMTY1Uh9Fb1SPP4fxWJjmb8
    </p>
    <img id="qr" width="200">
    <button onclick="closeDeposit()">Close</button>
  </div>
</div>

<script>

/* AUTH */
function toggle(){
  document.getElementById("signupBox").classList.toggle("hidden");
  document.getElementById("loginBox").classList.toggle("hidden");
}

function signup(){
  let u = JSON.parse(localStorage.getItem("users")||"[]");

  u.push({
    email:suEmail.value,
    pass:suPass.value
  });

  localStorage.setItem("users",JSON.stringify(u));
  alert("Account created");
  toggle();
}

function login(){
  let u = JSON.parse(localStorage.getItem("users")||"[]");

  let user = u.find(x=>x.email==liEmail.value && x.pass==liPass.value);

  if(!user) return alert("Invalid");

  localStorage.setItem("currentUser",JSON.stringify(user));
  showDashboard();
}

function showDashboard(){
  let user = JSON.parse(localStorage.getItem("currentUser"));

  authBox.classList.add("hidden");
  dashboard.classList.remove("hidden");

  userEmail.innerText = user.email;

  loadMarket();
  loadChart();
  updateBalance();
}

/* NAV */
function showPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.add("hidden"));
  document.getElementById(p).classList.remove("hidden");
}

/* MARKET */
async function loadMarket(){
  let s=["BTCUSDT","ETHUSDT","BNBUSDT"];
  let html="";

  for(let i of s){
    let r=await fetch("https://api.binance.com/api/v3/ticker/price?symbol="+i);
    let d=await r.json();

    html+=`<div class="coin">${i} - $${d.price}</div>`;
  }

  prices.innerHTML=html;
}

/* CHART */
function loadChart(){
  new TradingView.widget({
    container_id:"chart",
    width:"100%",
    height:300,
    symbol:"BINANCE:BTCUSDT",
    theme:"dark",
    style:"1"
  });
}

/* DEPOSIT */
function openDeposit(){
  depositBox.style.display="flex";

  let w="TLdHhSyHgi8kMTY1Uh9Fb1SPP4fxWJjmb8";

  qr.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+w;
}

function closeDeposit(){
  depositBox.style.display="none";
}

/* BALANCE */
function updateBalance(){
  let b=localStorage.getItem("balance")||0;
  balance.innerText="$"+b;
  bal.innerText="$"+b;
}

/* AUTO LOGIN */
window.onload=function(){
  if(localStorage.getItem("currentUser")){
    showDashboard();
  }
}

</script>

</body>
</html>
